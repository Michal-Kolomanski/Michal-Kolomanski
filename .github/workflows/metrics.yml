name: GitHub Metrics

on:
  schedule:
    - cron: '0 1 * * *'  # Codziennie o 1:00 UTC (po race workflow)
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Michal-Kolomanski
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Warsaw
          filename: github-metrics.svg
          